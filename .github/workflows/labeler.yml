# Auto-labels PRs by which parts of the repo they touch (see .github/labeler.yml).
# Keeps the PR list scannable and gives release-please/reviewers a quick sense of
# scope. Labels are created on first use and synced to match the changed files.
name: Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          sync-labels: true
