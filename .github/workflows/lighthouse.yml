# Lighthouse CI on every PR and after each merge to main — guards accessibility
# (a DESIGN.md first-class value) and tracks SEO/best-practices/performance (SEO
# is on the 1.0 roadmap). Builds the site and audits the key pages from the static
# _site output. Accessibility is a hard gate (error); the rest report as warnings.
# The push-to-main run is what populates the README status badge.
name: Lighthouse

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - run: npm ci
      - run: JEKYLL_ENV=production npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .github/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
