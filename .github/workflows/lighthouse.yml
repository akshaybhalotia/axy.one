# Lighthouse CI on every PR and after each merge to main — guards accessibility
# (a DESIGN.md first-class value) and tracks SEO/best-practices/performance (SEO
# is on the 1.0 roadmap). Builds the site; lighthouserc.json has no url list, so
# LHCI auto-discovers and audits every page in _site — new posts/projects/layouts
# are covered with no config change. Accessibility is a hard gate (error); the
# rest report as warnings. The push-to-main run populates the README status badge.
name: Lighthouse

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/build-site

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .github/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
