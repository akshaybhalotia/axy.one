# Enforces the Conventional-Commit styleguide (CONTRIBUTING.md) on PR titles.
# With squash-merge, the PR title becomes the commit subject on main, which is
# what release-please reads to build the changelog and pick the next version.
# The type list is CONTRIBUTING's human-facing set plus the operational types
# used by automation/maintenance (chore, ci, build, perf, test, revert).
name: PR title

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: write

jobs:
  validate:
    name: Validate title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            docs
            lint
            perf
            test
            build
            ci
            chore
            revert
