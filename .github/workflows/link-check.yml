# Weekly broken-link sweep. Builds the site and checks every link in the output
# (internal links resolved offline via --root-dir, external links hit live), then
# opens a tracking issue if anything is dead. Scheduled rather than a PR gate, so
# a flaky third-party host never blocks a merge.
name: Link check

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-site

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --root-dir "${{ github.workspace }}/_site"
            "./_site/**/*.html"
          fail: false

      - name: Open an issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken links found by the weekly link check"
          content-filepath: ./lychee/out.md
          labels: bug
