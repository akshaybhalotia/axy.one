name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.9" # keep in sync with .ruby-version / netlify.toml
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install npm deps
        run: npm ci

      # npm run build = vendor fonts/icons from npm + Tailwind CLI + jekyll build.
      - name: Build site
        run: JEKYLL_ENV=production npm run build
