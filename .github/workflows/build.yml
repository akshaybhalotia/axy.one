name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build the site
        uses: ./.github/actions/build-site

      # Guard the built output against "valid but wrong" regressions a green
      # build + Lighthouse miss: SEO invariants + the #27 share-card leak
      # (check-output.rb), then links/images/HTML (html-proofer).
      - name: Check the output
        shell: bash
        run: |
          bundle exec ruby .github/scripts/check-output.rb _site
          # Netlify redirect short-links (/github, /resume, …) resolve at the
          # edge and have no file in _site — ignore them so html-proofer doesn't
          # flag them as broken internal links. Derived from _redirects so the
          # list can't drift. External links are covered by the link-check job.
          ignore=$(awk '$1 ~ /^\// {print $1}' _redirects | paste -sd, -)
          bundle exec htmlproofer ./_site --disable-external --ignore-urls "$ignore"
