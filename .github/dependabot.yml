# Dependabot keeps the two toolchains + the Actions themselves up to date.
# Minor/patch bumps are grouped into a single PR per ecosystem to cut noise;
# majors come as individual PRs. Commit prefixes are Conventional Commits so the
# PR-title lint passes and release-please files them under hidden sections.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      npm:
        update-types: ["minor", "patch"]

  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      bundler:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]
