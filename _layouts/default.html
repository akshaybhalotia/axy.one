<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  {% if page.description or site.description %}
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {%- feed_meta -%}
</head>
<body class="bg-panel text-ink font-mono antialiased">
  <div class="min-h-screen desk:grid desk:grid-cols-[360px_1fr]">
    {% include sidebar.html %}
    <main class="px-6 py-10 desk:px-12 desk:py-16">
      {{ content }}
    </main>
  </div>
</body>
</html>
