<!DOCTYPE html>
<html lang="en" data-nav="closed">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  {% if page.description or site.description %}
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines }}">
  {% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400&display=swap">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {%- feed_meta -%}
  <script>
    /* Set initial nav state before paint to avoid flash: remembered choice,
       else open on desktop / closed on mobile. */
    (function () {
      var saved = localStorage.getItem("nav");
      var open = saved ? saved === "open" : window.matchMedia("(min-width: 1024px)").matches;
      document.documentElement.setAttribute("data-nav", open ? "open" : "closed");
    })();
  </script>
</head>
<body class="bg-panel text-ink font-mono antialiased">
  <div class="app-shell">
    {% include sidebar.html %}
    <main class="app-main px-6 pt-24 pb-12 desk:px-16 desk:py-16">
      <div class="app-main-inner">
        {{ content }}
      </div>
    </main>
  </div>

  {%- comment -%} The avatar IS the menu button: large when expanded, animates to
  a small corner badge when collapsed (and back). {%- endcomment -%}
  <button id="app-toggle" class="app-avatar" aria-label="Toggle navigation" aria-controls="app-sidebar">
    {%- if site.avatar -%}
    <img src="{{ site.avatar | relative_url }}" alt="{{ site.title }}">
    {%- else -%}
    <span class="app-avatar-fallback">AB</span>
    {%- endif -%}
  </button>

  <script>
    (function () {
      var root = document.documentElement;
      document.getElementById("app-toggle").addEventListener("click", function () {
        var next = root.getAttribute("data-nav") === "open" ? "closed" : "open";
        root.setAttribute("data-nav", next);
        localStorage.setItem("nav", next);
      });
    })();
  </script>
</body>
</html>
