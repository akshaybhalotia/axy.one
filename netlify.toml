[build]
  # `npm run build` = vendor fonts/icons from npm + compile Tailwind + jekyll build.
  # Netlify auto-installs both npm (package.json) and Bundler (Gemfile) deps first.
  command = "JEKYLL_ENV=production npm run build"
  publish = "_site"

[build.environment]
  RUBY_VERSION = "3.4.9" # keep in sync with .ruby-version
  NODE_VERSION = "22"    # keep in sync with .nvmrc / package.json engines
