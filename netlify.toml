[build]
  # `npm run build` = vendor fonts/icons from npm + compile Tailwind + jekyll build.
  # Netlify auto-installs both npm (package.json) and Bundler (Gemfile) deps first.
  command = "JEKYLL_ENV=production npm run build"
  publish = "_site"

# Node and Ruby versions are intentionally NOT pinned here: Netlify reads `.nvmrc`
# and `.ruby-version` directly, so those files are the single source of truth
# (shared with CI + local). Setting NODE_VERSION/RUBY_VERSION here would override
# and silently drift from them.
