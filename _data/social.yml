# Social links shown in the sidebar as brand-colored circle badges.
# icon = name in _includes/icon.html. bg = circle color, fg = glyph color.
# URLs use the existing Netlify redirects (/linkedin, /github).
- name: LinkedIn
  url: /linkedin
  icon: linkedin
  bg: "#0A66C2"
  fg: "#ffffff"
- name: GitHub
  url: /github
  icon: github
  bg: "#ffffff"
  fg: "#181717"
- name: Twitter
  url: /twitter
  icon: twitter
  bg: "#1DA1F2"
  fg: "#ffffff"
- name: Instagram
  url: /instagram
  icon: instagram
  bg: "#E4405F"
  fg: "#ffffff"
- name: Stack Overflow
  url: /stackoverflow
  icon: stackoverflow
  bg: "#F58025"
  fg: "#ffffff"
